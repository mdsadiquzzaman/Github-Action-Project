name: E2E Tests (PR Gate)

on:
  pull_request:
    branches: [ "main" ]

jobs:
  e2e-tests:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Create .env file
      run: |
        echo "PORT=3000" >> .env
        echo "MONGO_URI=mongodb://127.0.0.1:27017/node_crud_api" >> .env
        echo "JWT_SECRET=ci_e2e_secret_key" >> .env

    - name: Seed the Database
      run: npm run seed

    - name: Run Playwright E2E Tests
      run: npm run test:e2e

    - name: Upload Playwright Report & Failures
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }} # Runs even if the test step above fails (but not if user cancels)
      with:
        name: playwright-e2e-report
        path: |
          playwright-report/      # The HTML report
          test-results/           # Screenshots and videos
        retention-days: 7         # Delete the artifact after 7 days to save space